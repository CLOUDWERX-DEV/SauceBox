<!DOCTYPE html>
<html>
<head>
  <title>SauceBox Extension Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
      max-width: 400px;
      background-color: #0f0f0f;
      color: #ffffff;
    }
    h2 {
      margin-top: 0;
      color: #FF8C00;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #FF8C0050;
      border-radius: 6px;
      background-color: #1a1a1a;
      color: #fff;
      box-sizing: border-box;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #FF8C00;
    }
    button {
      background-color: #FF8C00;
      color: #000000;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #e67e00;
    }
    #status {
      margin-top: 15px;
      color: #00ff00;
      font-weight: bold;
      text-align: center;
      min-height: 20px;
    }
    .hint {
      font-size: 0.85em;
      color: #888;
      margin-top: -10px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <h2>SauceBox Configuration</h2>
  
  <label for="serverUrl">SauceBox Server URL:</label>
  <input type="text" id="serverUrl" placeholder="http://127.0.0.1:13337">
  <div class="hint">
    Desktop Default: <code>http://127.0.0.1:13337</code><br>
    Docker Example: <code>http://192.168.1.100:8080</code>
  </div>

  <button id="saveBtn">Save Settings</button>

  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
